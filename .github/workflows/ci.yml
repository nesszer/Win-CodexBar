name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  rust-quality-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Linux system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06)
        with:
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --manifest-path rust/Cargo.toml --all --check

      - name: Run clippy
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --target x86_64-unknown-linux-gnu -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path rust/Cargo.toml --target x86_64-unknown-linux-gnu

      - name: Run Tauri clippy
        run: cargo clippy --manifest-path apps/desktop-tauri/src-tauri/Cargo.toml --all-targets --target x86_64-unknown-linux-gnu -- -D warnings

      - name: Run Tauri tests
        run: cargo test --manifest-path apps/desktop-tauri/src-tauri/Cargo.toml --target x86_64-unknown-linux-gnu

  frontend-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.18.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop-tauri/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir apps/desktop-tauri install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir apps/desktop-tauri run build

  windows-build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06)
        with:
          components: clippy
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Run clippy
        shell: bash
        run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --target x86_64-pc-windows-msvc -- -D warnings

      - name: Run tests
        shell: bash
        run: cargo test --manifest-path rust/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build \
            --manifest-path rust/Cargo.toml \
            --release \
            --target x86_64-pc-windows-msvc \
            --bin codexbar

      - name: Smoke test Windows CLI
        shell: pwsh
        run: |
          $exe = Resolve-Path "target\x86_64-pc-windows-msvc\release\codexbar.exe"
          $output = (& $exe --version 2>&1 | Out-String).Trim()

          if ($LASTEXITCODE -ne 0) {
            throw "codexbar.exe --version exited with code $LASTEXITCODE"
          }

          Write-Host $output

          if ([string]::IsNullOrWhiteSpace($output)) {
            throw "codexbar.exe --version produced no output"
          }

  linux-cli-smoke:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs-on: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: x86_64
          - name: linux-arm64
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: aarch64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Linux system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06)
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build Linux CLI
        run: cargo build --manifest-path rust/Cargo.toml --release --target ${{ matrix.target }} --bin codexbar

      - name: Smoke test CLI
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/${{ matrix.target }}/release/codexbar"
          "$BIN" --help >/dev/null
          "$BIN" --version >/dev/null
          "$BIN" usage --help >/dev/null
