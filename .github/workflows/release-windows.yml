name: Release Windows App

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.18.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/desktop-tauri/pnpm-lock.yaml

      - name: Read app version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' rust/Cargo.toml | head -n 1)"
          if [[ -z "$VERSION" ]]; then
            echo "Failed to determine app version from rust/Cargo.toml" >&2
            exit 1
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (2026-06)
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        shell: bash
        run: pnpm --dir apps/desktop-tauri install --frozen-lockfile

      - name: Build Windows executable
        shell: bash
        run: |
          set -euo pipefail
          cargo build --manifest-path rust/Cargo.toml --release --bin codexbar
          cp "target/release/codexbar.exe" "target/release/codexbar-cli.exe"

          pnpm --dir apps/desktop-tauri exec tauri build --no-bundle

          SOURCE_EXE="target/release/codexbar-desktop-tauri.exe"
          DEST_EXE="target/release/codexbar.exe"
          LEGACY_DESKTOP_EXE="target/release/codexbar-desktop.exe"

          if [[ ! -f "$SOURCE_EXE" ]]; then
            echo "Missing expected Tauri binary: $SOURCE_EXE" >&2
            exit 1
          fi

          cp "$SOURCE_EXE" "$DEST_EXE"
          cp "$SOURCE_EXE" "$LEGACY_DESKTOP_EXE"

          if command -v objdump >/dev/null 2>&1; then
            if objdump -p "$DEST_EXE" | grep -qi 'DLL Name: WebView2Loader.dll'; then
              echo "codexbar.exe imports WebView2Loader.dll, but release builds are expected to statically link the loader." >&2
              exit 1
            fi
          fi

      - name: Verify executable layout
        shell: pwsh
        run: |
          .\scripts\verify-windows-executables.ps1 `
            -DesktopExe "target\release\codexbar.exe" `
            -CliExe "target\release\codexbar-cli.exe" `
            -LegacyDesktopExe "target\release\codexbar-desktop.exe" `
            -CheckCliStdout

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Download installer dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force rust\target\installer-deps | Out-Null
          $vcRedistPath = "rust\target\installer-deps\vc_redist.x64.exe"
          $webView2BootstrapperPath = "rust\target\installer-deps\MicrosoftEdgeWebview2Setup.exe"
          Invoke-WebRequest `
            -Uri "https://aka.ms/vc14/vc_redist.x64.exe" `
            -OutFile $vcRedistPath
          Invoke-WebRequest `
            -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile $webView2BootstrapperPath

          foreach ($dependency in @($vcRedistPath, $webView2BootstrapperPath)) {
            $signature = Get-AuthenticodeSignature -FilePath $dependency
            if ($signature.Status -ne 'Valid') {
              throw "$dependency signature is not valid. Status: $($signature.Status)"
            }

            $subject = $signature.SignerCertificate.Subject
            if ($subject -notlike '*Microsoft Corporation*') {
              throw "$dependency signer is unexpected: $subject"
            }
          }

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force rust\target\installer | Out-Null
          $iscc = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler not found at $iscc"
          }

          Push-Location rust\installer
          try {
            & $iscc `
              /Qp `
              "/DAppVersion=$env:APP_VERSION" `
              "/DTargetBinDir=..\..\target\release" `
              "/DVCRedistPath=..\target\installer-deps\vc_redist.x64.exe" `
              "/DWebView2BootstrapperPath=..\target\installer-deps\MicrosoftEdgeWebview2Setup.exe" `
              "/DOutputDir=..\target\installer" `
              "/DOutputBaseFilename=CodexBar-$env:APP_VERSION-Setup" `
              codexbar.iss
          } finally {
            Pop-Location
          }

      - name: Prepare release assets
        shell: pwsh
        run: |
          $assetDir = "rust\target\release-assets"
          New-Item -ItemType Directory -Force $assetDir | Out-Null

          $installer = "rust\target\installer\CodexBar-$env:APP_VERSION-Setup.exe"
          $portableExe = Join-Path $assetDir "CodexBar-$env:APP_VERSION-portable.exe"

          foreach ($path in @("target\release\codexbar.exe", "target\release\codexbar-cli.exe", "target\release\codexbar-desktop.exe", $installer)) {
            if (-not (Test-Path $path)) {
              throw "Missing expected asset: $path"
            }
          }

          Copy-Item "target\release\codexbar.exe" $portableExe -Force

          foreach ($path in @($installer, $portableExe)) {
            $fileName = Split-Path $path -Leaf
            $destPath = Join-Path $assetDir $fileName
            if ((Resolve-Path $path).Path -ne (Resolve-Path $destPath -ErrorAction SilentlyContinue).Path) {
              Copy-Item $path $assetDir -Force
            }

            $hash = (Get-FileHash -Algorithm SHA256 $destPath).Hash.ToLower()
            "$hash  $fileName" | Set-Content -Encoding ascii "$destPath.sha256"
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: codexbar-windows-release-assets
          path: |
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-Setup.exe
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-Setup.exe.sha256
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-portable.exe
            rust/target/release-assets/CodexBar-${{ env.APP_VERSION }}-portable.exe.sha256

  publish-windows-release:
    if: github.event_name == 'release'
    needs: build-windows-app
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: codexbar-windows-release-assets
          path: release-assets

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
