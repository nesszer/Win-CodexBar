name: Interaction guard

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  guard:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - run: node .github/scripts/interaction-guard.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
