version: 0.29.0.{build}

image: Visual Studio 2022
clone_depth: 1
skip_branch_with_pr: true
max_jobs: 1

environment:
  APPVEYOR_FULL_RELEASE: false
  CARGO_TERM_COLOR: never
  CARGO_TERM_PROGRESS_WHEN: never
  NO_COLOR: 1

cache:
  - C:\Users\appveyor\.cargo\bin -> appveyor.yml
  - C:\Users\appveyor\.rustup -> appveyor.yml
  - C:\code\Win-CodexBar-release\cache\cargo-target -> Cargo.lock
  - C:\code\Win-CodexBar-release\cache\pnpm-store -> apps\desktop-tauri\pnpm-lock.yaml
  - C:\code\Win-CodexBar-release\cache\installer-deps -> scripts\windows-release-build.ps1

install:
  - ps: |
      if ($env:APPVEYOR_REPO_TAG -eq "true" -or $env:APPVEYOR_FULL_RELEASE -eq "true") {
        $env:FULL_WINDOWS_RELEASE = "true"
      } else {
        $env:FULL_WINDOWS_RELEASE = "false"
      }
      .\scripts\ci\install-circleci-release-tools.ps1

build_script:
  - ps: |
      $ref = if ($env:APPVEYOR_REPO_TAG -eq "true") {
        $env:APPVEYOR_REPO_TAG_NAME
      } else {
        $env:APPVEYOR_REPO_COMMIT
      }

      $args = @(
        "-Ref", $ref,
        "-WorkRoot", "C:\code\Win-CodexBar-release"
      )

      if ($env:FULL_WINDOWS_RELEASE -eq "true") {
        $args += "-SmokeInstall"
      } else {
        $args += "-WarmCacheOnly"
      }

      .\scripts\windows-release-build.ps1 @args

after_build:
  - ps: |
      New-Item -ItemType Directory -Force appveyor-artifacts | Out-Null
      Copy-Item C:\code\Win-CodexBar-release\assets\* appveyor-artifacts\ -Force

artifacts:
  - path: appveyor-artifacts\*
    name: win-codexbar-release-assets

test: off
deploy: off
