version: 2.1

orbs:
  win: circleci/windows@5.0

parameters:
  run_windows_release:
    type: boolean
    default: false
  upload_cloudflare:
    type: boolean
    default: false
  full_windows_release:
    type: boolean
    default: false

jobs:
  windows-release:
    parameters:
      upload_cloudflare:
        type: boolean
        default: false
      full_release:
        type: boolean
        default: false
    executor:
      name: win/default
      size: large
    steps:
      - run:
          name: Checkout code over HTTPS
          shell: powershell.exe
          command: $(git clone --no-checkout https://github.com/Finesssee/Win-CodexBar.git . | Out-Host; $?) -and $(git checkout $env:CIRCLE_SHA1 | Out-Host; $?)

      - restore_cache:
          name: Restore Rust toolchain cache
          keys:
            - win-rust-toolchain-v1-

      - restore_cache:
          name: Restore Cargo target cache
          keys:
            - win-cargo-target-v2-{{ checksum "Cargo.lock" }}
            - win-cargo-target-v2-

      - restore_cache:
          name: Restore pnpm store cache
          keys:
            - win-pnpm-store-v1-{{ checksum "apps/desktop-tauri/pnpm-lock.yaml" }}
            - win-pnpm-store-v1-

      - restore_cache:
          name: Restore installer dependency cache
          keys:
            - win-installer-deps-v1-

      - run:
          name: Install and verify release tools
          shell: cmd.exe
          command: set "FULL_WINDOWS_RELEASE=<< parameters.full_release >>" && call scripts\ci\install-circleci-release-tools.cmd & if errorlevel 1 exit /b 1

      - run:
          name: Build Windows release
          shell: cmd.exe
          no_output_timeout: 30m
          command: set "FULL_WINDOWS_RELEASE=<< parameters.full_release >>" && set "UPLOAD_CLOUDFLARE=<< parameters.upload_cloudflare >>" && call scripts\ci\circleci-release.cmd & if errorlevel 1 exit /b 1

      - run:
          name: Assert Windows build output
          shell: cmd.exe
          command: if "<< parameters.full_release >>"=="true" (call scripts\ci\assert-release-assets.cmd) else (call scripts\ci\assert-warm-build.cmd) & if errorlevel 1 exit /b 1

      - save_cache:
          name: Save Rust toolchain cache
          key: win-rust-toolchain-v1-{{ epoch }}
          paths:
            - C:/Users/circleci/.cargo/bin
            - C:/Users/circleci/.rustup

      - save_cache:
          name: Save Cargo target cache
          key: win-cargo-target-v2-{{ checksum "Cargo.lock" }}-{{ epoch }}
          paths:
            - C:/code/Win-CodexBar-release/cache/cargo-target

      - save_cache:
          name: Save pnpm store cache
          key: win-pnpm-store-v1-{{ checksum "apps/desktop-tauri/pnpm-lock.yaml" }}-{{ epoch }}
          paths:
            - C:/code/Win-CodexBar-release/cache/pnpm-store

      - save_cache:
          name: Save installer dependency cache
          key: win-installer-deps-v1-{{ epoch }}
          paths:
            - C:/code/Win-CodexBar-release/cache/installer-deps

      - store_artifacts:
          path: C:/code/Win-CodexBar-release/assets
          destination: win-codexbar-release-assets

workflows:
  tagged-windows-release:
    jobs:
      - windows-release:
          name: windows-release-tag
          upload_cloudflare: true
          full_release: true
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

  manual-windows-release:
    when: << pipeline.parameters.run_windows_release >>
    jobs:
      - windows-release:
          name: windows-release-manual
          upload_cloudflare: << pipeline.parameters.upload_cloudflare >>
          full_release: << pipeline.parameters.full_windows_release >>
