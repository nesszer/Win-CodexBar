version: 2.1

orbs:
  win: circleci/windows@5.0

parameters:
  run_windows_release:
    type: boolean
    default: false
  upload_cloudflare:
    type: boolean
    default: false

jobs:
  windows-release:
    parameters:
      upload_cloudflare:
        type: boolean
        default: false
    executor:
      name: win/default
      size: large
    steps:
      - run:
          name: Checkout code over HTTPS
          shell: powershell.exe
          command: $(git clone --no-checkout https://github.com/Finesssee/Win-CodexBar.git . | Out-Host; $?) -and $(git checkout $env:CIRCLE_SHA1 | Out-Host; $?)

      - run:
          name: Install and verify release tools
          shell: powershell.exe
          command: $(powershell.exe -NoLogo -ExecutionPolicy Bypass -File scripts\ci\install-circleci-release-tools.ps1 | Out-Host; $LASTEXITCODE -eq 0)

      - run:
          name: Build and smoke test Windows release
          shell: powershell.exe
          no_output_timeout: 30m
          command: $env:CARGO_BUILD_TARGET = "x86_64-pc-windows-msvc"; $(powershell.exe -NoLogo -ExecutionPolicy Bypass -File scripts\ci\circleci-release.ps1 | Out-Host; $LASTEXITCODE -eq 0)

      - run:
          name: Assert release artifacts
          shell: powershell.exe
          command: $(powershell.exe -NoLogo -ExecutionPolicy Bypass -File scripts\ci\assert-release-assets.ps1 | Out-Host; $LASTEXITCODE -eq 0)

      - store_artifacts:
          path: C:/code/Win-CodexBar-release/assets
          destination: win-codexbar-release-assets

workflows:
  tagged-windows-release:
    jobs:
      - windows-release:
          name: windows-release-tag
          upload_cloudflare: true
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/

  manual-windows-release:
    when: << pipeline.parameters.run_windows_release >>
    jobs:
      - windows-release:
          name: windows-release-manual
          upload_cloudflare: << pipeline.parameters.upload_cloudflare >>
